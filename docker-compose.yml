services:
  db:
    image: postgres:17-alpine
    container_name: alura-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-alura}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alura}
      POSTGRES_DB: ${DB_NAME:-alura_auth}
    ports:
      # Host 5433 evita conflito com instalações locais de PostgreSQL na 5432.
      - "${DB_PORT:-5433}:5432"
    volumes:
      # Volume nomeado: mantém os dados persistidos entre restarts/recriações.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-alura} -d ${DB_NAME:-alura_auth}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
